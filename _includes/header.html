<header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/80 backdrop-blur-md transition-colors duration-300 dark:border-gray-800 dark:bg-gray-900/90">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6">
        
        <a href="{{ '/' | relative_url }}" class="flex items-center gap-3 group">
            <div class="flex h-9 w-9 items-center justify-center overflow-hidden rounded-lg bg-white p-1 shadow-sm ring-1 ring-gray-200 transition group-hover:ring-bltRed/50">
                <img src="{{ site.baseurl }}/assets/images/blt-logo.png" 
                     alt="OWASP BLT Logo" 
                     class="h-full w-full object-contain">
            </div>
            <span class="text-lg font-bold tracking-tight text-gray-900 dark:text-white">
                {{ site.university.name | default: "BLT University" }}
            </span>
        </a>

        <nav class="hidden items-center gap-8 md:flex">
            {% for item in site.navigation %}
                <a href="{{ item.url | relative_url }}"
                   class="relative text-sm font-medium transition-colors {% if page.url == item.url %} text-bltRed {% else %} text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white {% endif %}">
                    {{ item.title }}
                    {% if page.url == item.url %}
                        <span class="absolute -bottom-[21px] left-0 h-0.5 w-full bg-bltRed"></span>
                    {% endif %}
                </a>
            {% endfor %}
        </nav>

        <div class="flex items-center gap-4">
            <!-- Theme Toggle -->
            <button id="theme-toggle" 
                    aria-label="Toggle Dark Mode"
                    class="rounded-lg p-2 text-gray-500 transition hover:bg-gray-100 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white">
                <i id="theme-icon" class="fas fa-sun hidden dark:block"></i>
                <i id="theme-icon-dark" class="fas fa-moon block dark:hidden"></i>
            </button>
        </div>
    </div>
</header>
